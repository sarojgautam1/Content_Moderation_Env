name: content-moderation-env
description: Multi-step AI content moderation environment with tool usage and reasoning
version: 1.0

entrypoint: server.app:app

endpoints:
  reset: /reset
  step: /step
  state: /state
  evaluate: /evaluate
  tasks: /tasks

models:
  observation: Observation
  action: Action
  reward: Reward

tasks:
  - id: task_easy_001
    difficulty: easy
    grader: evaluate_trajectory

  - id: task_medium_001
    difficulty: medium
    grader: evaluate_trajectory

  - id: task_medium_002
    difficulty: medium
    grader: evaluate_trajectory

  - id: task_hard_001
    difficulty: hard
    grader: evaluate_trajectory

  - id: task_hard_002
    difficulty: hard
    grader: evaluate_trajectory

  - id: task_hard_003
    difficulty: hard
    grader: evaluate_trajectory

graders:
  - name: evaluate_trajectory
    entrypoint: grader:evaluate_trajectory

metadata:
  author: team
  difficulty: easy-medium-hard
  task_type: moderation

