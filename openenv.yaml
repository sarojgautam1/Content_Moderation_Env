name: content-moderation-env
description: Multi-step AI content moderation environment with tool usage and reasoning
version: 1.0

entrypoint: server.app:app

endpoints:
  reset: /reset
  step: /step
  state: /state
  evaluate: /evaluate
  tasks: /tasks

models:
  observation: Observation
  action: Action
  reward: Reward

tasks:
  - id: task_easy_001
    grader: evaluate_trajectory
  - id: task_medium_001
    grader: evaluate_trajectory
  - id: task_medium_002
    grader: evaluate_trajectory
  - id: task_hard_001
    grader: evaluate_trajectory
  - id: task_hard_002
    grader: evaluate_trajectory
  - id: task_hard_003
    grader: evaluate_trajectory

graders:
  - name: hate_speech_grader
    entrypoint: grader:evaluate_trajectory

  - name: misinfo_grader
    entrypoint: grader:evaluate_trajectory

  - name: satire_escalation_grader
    entrypoint: grader:evaluate_trajectory

  - name: satire_dismiss_grader
    entrypoint: grader:evaluate_trajectory

  - name: implicit_hate_grader
    entrypoint: grader:evaluate_trajectory

metadata:
  author: team
  difficulty: easy-medium-hard
  task_type: moderation

